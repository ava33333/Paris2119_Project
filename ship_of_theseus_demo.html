<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ship of Theseus Demo</title>
</head>

<body>
    <nav class="menu">
        <div class="menu-toggle" onclick="toggleMenu()">☰ Menu</div>
        <ul id="menu-list" class="menu-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="ship_of_theseus_demo.html">Ship of Theseus</a></li>
            <li><a href="transcore_simulation.html">Transcore Simulation</a></li>
            <li><a href="paris_2119_history.html">BD History</a></li>
            <li><a href="historical_connections.html">Historical</a></li>
        </ul>
    </nav>

    <header><h1>
        Ship of Theseus Demo
    </h1></header>

    <div class="section">
        <p>Intro section about ship of Theseus.</p>
    </div>

    <div class="section">
        <div id="ship-container">
        <svg viewBox="0 0 500 270" xmlns="http://www.w3.org/2000/svg" style="display:block;max-width:300px;background:#D8EBF5">
            <defs>
            <clipPath id="hull-clip">
                <path d="M 70,186 L 450,170 Q 477,170 483,208 Q 483,246 446,260 L 70,254 Z"/>
            </clipPath>
            </defs>

            <rect x="0" y="0" width="500" height="270" fill="#D8EBF5"/>
            <ellipse cx="90" cy="42" rx="52" ry="16" fill="#EEF6FC"/>
            <ellipse cx="390" cy="50" rx="44" ry="15" fill="#EEF6FC"/>
            <rect x="0" y="222" width="500" height="48" fill="#3A8CAB"/>
            <path d="M 0,222 Q 40,216 80,222 Q 120,228 160,222 Q 200,216 240,222 Q 280,228 320,222 Q 360,216 400,222 Q 440,228 500,222" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

            <g clip-path="url(#hull-clip)">
            <rect id="plank-deck"  x="0" y="166" width="500" height="29" fill="#D4A85A"/>
            <rect id="plank-upper" x="0" y="195" width="500" height="15" fill="#C49040"/>
            <rect id="plank-mid"   x="0" y="210" width="500" height="17" fill="#C49040"/>
            <rect id="plank-lower" x="0" y="227" width="500" height="15" fill="#C49040"/>
            <rect id="plank-keel"  x="0" y="242" width="500" height="20" fill="#9E7020"/>
            <line x1="0" y1="195" x2="500" y2="195" stroke="#4A2808" stroke-width="1.5" opacity=".3"/>
            <line x1="0" y1="210" x2="500" y2="210" stroke="#4A2808" stroke-width="1.5" opacity=".3"/>
            <line x1="0" y1="227" x2="500" y2="227" stroke="#4A2808" stroke-width="1.5" opacity=".3"/>
            <line x1="0" y1="242" x2="500" y2="242" stroke="#4A2808" stroke-width="1.5" opacity=".3"/>
            </g>

            <rect x="62" y="184" width="10" height="72" fill="#7A5028" stroke="#4A2808" stroke-width="1.5"/>
            <path d="M 70,186 L 450,170 Q 477,170 483,208 Q 483,246 446,260 L 70,254 Z" fill="none" stroke="#3D2508" stroke-width="2.5"/>
            <line x1="448" y1="177" x2="500" y2="143" stroke="#6B4226" stroke-width="7" stroke-linecap="round"/>
            <line x1="197" y1="46" x2="500" y2="143" stroke="#6A5030" stroke-width="1" opacity=".5"/>
            <line x1="197" y1="46" x2="70" y2="186" stroke="#6A5030" stroke-width="1" opacity=".4"/>

            <g id="mast">
            <rect x="193" y="42" width="11" height="130" rx="3" fill="#6B4226"/>
            <rect x="168" y="90" width="58" height="5" rx="2" fill="#5A3520"/>
            </g>
            <rect x="193" y="167" width="112" height="5" rx="2" fill="#6B4226"/>
            <polygon id="sail-main" points="204,52 306,167 204,167" fill="#EDE0C0" stroke="#C4B080" stroke-width="1.5"/>
            <polygon id="sail-sm" points="198,42 198,26 238,34" fill="#8B1A1A"/>
        </svg>
        </div>

        <p id="next-text">Click next to replace the part.</p> <button id="next-button" onclick="replaceParts()">Next</button>
        <label for="answer-box" id="complete-text" style="display:none"><strong>Every part has been replaced.</strong><br><br>Is it the same ship? Why or why not?<br></label>
        <textarea id="answer-box" style="display:none" name="answer-box" placeholder="Enter your answer here"></textarea>
        <br>
        <button id="submit-button" style="display:none" onclick="revealConnections()">Submit</button>
        
        <p id="connections-text" style="display:none">There is no right or wrong answer to this question.</p>
        
        <button id="next-page-button" style="display:none" onclick = "window.location.href='transcore_simulation.html'">Go to Next Page</button>
    
    </div>

    <script>
    var incr = 0;
    const svg_arr = ['plank-keel', 'plank-lower', 'plank-mid', 'plank-upper', 'plank-deck', 'mast', 'sail-main', 'sail-sm'];

    
    function toggleMenu() {
        const list = document.getElementById('menu-list');
        list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    function replaceParts() {
        
        var piece = document.getElementById(svg_arr[incr]);

        setTimeout(() => {piece.classList.remove('replacing')}, 400);

        piece.classList.add('replacing');

        //increments after the demo to go to next piece
        incr++;

        if(incr > svg_arr.length - 1) {
            const next_button = document.getElementById("next-button");
            const next_text = document.getElementById("next-text");

            next_button.style.display = 'none';
            next_text.style.display = 'none';

            const complete_text = document.getElementById("complete-text");
            complete_text.style.display = '';

            const answer_box = document.getElementById("answer-box");
            answer_box.style.display = '';

            const submit_button = document.getElementById("submit-button");
            submit_button.style.display = '';
        }
    }

    function revealConnections() {
        
        const submit_button = document.getElementById("submit-button");
        submit_button.style.display = 'none';

        const answer_box = document.getElementById("answer-box");
        answer_box.style.display = "none"

        const connections_text = document.getElementById("connections-text");
        connections_text.style.display = '';

        const next_page_button = document.getElementById("next-page-button");
        next_page_button.style.display = '';
    }

    </script>
</body>

</html>
