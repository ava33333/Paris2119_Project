            <img id="p3"src="assets/pending.png" alt="pending" style="display:none; max-height:10vh; text-align:center">

            <img id="p5" src="assets/pending.png" alt="pending" style="display:none; max-height:10vh; text-align:center">
            <img id="p6" src="assets/pending.png" alt="pending" style="display:none; max-height:10vh; text-align:center">
            <img id="k5" src="assets/kloé2.png" alt="kloé2" style="display:none; max-height:20vh; text-align:right"><br>

            <button id="b2" onclick="this.style.display='none'; transport(['p4','p5','p6'], ['k5', 'k6'], 'b3')" style="display:none">Transport Kloé</button>

            <img id="k6" src="assets/kloé6.png" alt="kloé6" style="display:none; max-height:20vh; text-align:left">
            <img id="p7" src="assets/pending.png" alt="pending" style="display:none; max-height:10vh; text-align:center">
            <img id="p8" src="assets/pending.png" alt="pending" style="display:none; max-height:10vh; text-align:center">
            <img id="p9" src="assets/pending.png" alt="pending" style="display:none; max-height:10vh; text-align:center">    
            <img id="k7" src="assets/kloé4.png" alt="kloé4" style="display:none; max-height:20vh; text-align:right"><br>

            <img id="k8" src="assets/kloé5.png" alt="kloé5" style="display:none; max-height:20vh; text-align:left">

    <!-- MENU SCRIPT -->
    <script>
    function toggleMenu() {
        const list = document.getElementById('menu-list');
        list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    function display(id) {
        document.getElementById(id).style.display = '';
    }

    function close(id) {
        document.getElementById(id).style.display = 'none';
    }

    function transport(dots, finalImgs, nextBtn) {
        setTimeout(() => display(dots[0]), 800);
        setTimeout(() => display(dots[1]), 2000);
        setTimeout(() => display(dots[2]), 3200);
        setTimeout(() => display(finalImgs[0]), 5000);
        if (finalImgs[1]) {
            setTimeout(() => {
                display(finalImgs[1]);
                if (nextBtn) display(nextBtn);
            }, 6000);
        }
        if (finalImgs[2]) setTimeout(() => display(finalImgs[2]), 7000);
    }

    </script>
